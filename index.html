<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IdroLife - Il Tormentatore</title>
    <style>
        :root { --blue: #00a8ff; --green: #4cd137; --red: #e84118; --dark: #2f3640; --light: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: white; width: 90%; max-width: 360px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .page { display: none; } .active { display: block; }
        
        .bottle-wrapper { width: 100px; height: 200px; border: 4px solid var(--dark); border-radius: 10px 10px 25px 25px; margin: 20px auto; position: relative; background: #fff; overflow: hidden; }
        .water-level { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, #0077be, var(--blue)); transition: height 0.5s ease-in-out; }
        .target-line { position: absolute; width: 100%; border-top: 2px dashed var(--red); z-index: 2; transition: bottom 0.5s; }

        input { width: 80%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 1rem; }
        button { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-drink { background: var(--blue); color: white; font-size: 1.1rem; }
        .btn-setup { background: var(--green); color: white; }
        .btn-back { background: none; color: #7f8c8d; text-decoration: underline; font-size: 0.9rem; margin-bottom: 10px; }
        .status-msg { font-weight: bold; margin: 10px 0; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="setup-page" class="card page active">
        <h1>Configurazione ⚙️</h1>
        <label>Obiettivo Giornaliero (ml):</label><br>
        <input type="number" id="input-goal" value="2000"><br>
        <label>Ora Sveglia:</label><br>
        <input type="time" id="input-wake" value="08:00"><br>
        <label>Ora Sonno:</label><br>
        <input type="time" id="input-sleep" value="23:00"><br>
        <button class="btn-setup" onclick="salvaEAvvia()">SALVA E INIZIA</button>
        <p style="font-size: 0.7rem; color: #999;">Lascia l'app nel multitasking per ricevere le notifiche ironiche!</p>
    </div>

    <div id="main-page" class="card page">
        <button class="btn-back" onclick="mostraSetup()">⬅ Cambia Impostazioni</button>
        
        <div id="status-msg" class="status-msg">Calcolo il tuo destino idrico...</div>

        <div class="bottle-wrapper">
            <div id="fill" class="water-level"></div>
            <div id="target-mark" class="target-line"></div>
        </div>

        <div style="font-size: 1.8rem; font-weight: bold; margin: 10px 0;">
            <span id="label-drunk">0</span> / <span id="label-goal">2000</span> <small>ml</small>
        </div>

        <button class="btn-drink" onclick="bevi()">BEVI UN BICCHIERE (250ml)</button>
        <p id="info-ritardo" style="color: var(--red); font-size: 0.9rem; font-weight: bold;"></p>
    </div>

<script>
    let appData = {
        goal: 2000,
        wake: "08:00",
        sleep: "23:00",
        drunk: 0,
        lastDate: "",
        nextReminder: 0   // timestamp della prossima notifica
    };

    let reminderInterval = null;

    window.onload = function() {
        const saved = localStorage.getItem('idrolife_data');
        if (saved) {
            appData = JSON.parse(saved);
            const oggi = new Date().toDateString();
            if (appData.lastDate !== oggi) {
                appData.drunk = 0;
                appData.lastDate = oggi;
                salvaDati();
            }
            mostraMain();
        }
        richiediNotifiche();
    };

    function mostraSetup() {
        document.getElementById('main-page').classList.remove('active');
        document.getElementById('setup-page').classList.add('active');
        clearInterval(reminderInterval);
    }

    function mostraMain() {
        document.getElementById('setup-page').classList.remove('active');
        document.getElementById('main-page').classList.add('active');
        aggiornaLogica();
        avviaReminder();
    }

    function salvaEAvvia() {
        appData.goal = parseInt(document.getElementById('input-goal').value) || 2000;
        appData.wake = document.getElementById('input-wake').value;
        appData.sleep = document.getElementById('input-sleep').value;
        appData.lastDate = new Date().toDateString();
        appData.nextReminder = 0;
        
        salvaDati();
        mostraMain();
        richiediNotifiche();
    }

    function salvaDati() {
        localStorage.setItem('idrolife_data', JSON.stringify(appData));
    }

    function richiediNotifiche() {
        if ("Notification" in window && Notification.permission !== "granted") {
            Notification.requestPermission();
        }
    }

    // ==================== LOGICA IRONICA ADATTIVA ====================
    function calcolaObiettivoOra() {
        const ora = new Date();
        const [wH, wM] = appData.wake.split(':').map(Number);
        const [sH, sM] = appData.sleep.split(':').map(Number);
        
        let wakeDate = new Date(); wakeDate.setHours(wH, wM, 0, 0);
        let sleepDate = new Date(); sleepDate.setHours(sH, sM, 0, 0);
        if (sleepDate <= wakeDate) sleepDate.setDate(sleepDate.getDate() + 1);

        const minutiTotali = (sleepDate - wakeDate) / 60000;
        const minutiPassati = Math.max(0, (ora - wakeDate) / 60000);

        if (ora < wakeDate) return 0;
        if (ora > sleepDate) return appData.goal;

        return Math.floor((appData.goal / minutiTotali) * minutiPassati);
    }

    function calcolaDeficit() {
        return calcolaObiettivoOra() - appData.drunk;
    }

    function calcolaProssimoIntervallo(deficit) {
        if (deficit <= 0) return 110 * 60 * 1000;        // sei un mostro
        if (deficit <= 400) return 70 * 60 * 1000;       // dai, non sei messo male
        return 40 * 60 * 1000;                           // muoviti lumaca!
    }

    function creaNotificaIronica() {
        const deficit = calcolaDeficit();
        let titolo = "💧 IdroLife ti chiama";
        let corpo = "";

        if (deficit <= 0) {
            corpo = `Sei una bestia idrica! Hai già superato l'obiettivo del momento. Continua così, campione! 💪`;
        } else if (deficit <= 400) {
            corpo = `Ehi, non vorrai mica diventare una pianta appassita? Ti mancano solo ${deficit} ml per essere in pari. Un bicchierino? 😉`;
        } else {
            corpo = `Ok, ammettilo: stai battendo il record di disidratazione? 😂 Ti servono urgentemente ${deficit} ml. Muoviti!`;
        }

        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(titolo, {
                body: corpo,
                icon: "https://cdn-icons-png.flaticon.com/512/3095/3095568.png", // icona acqua
                tag: "idrolife-reminder"
            });
        }
    }

    function avviaReminder() {
        clearInterval(reminderInterval);
        
        reminderInterval = setInterval(() => {
            const adesso = Date.now();
            if (adesso >= appData.nextReminder) {
                creaNotificaIronica();
                // programma la prossima
                const deficit = calcolaDeficit();
                const intervallo = calcolaProssimoIntervallo(deficit);
                appData.nextReminder = adesso + intervallo;
                salvaDati();
            }
        }, 30000); // controlla ogni 30 secondi
    }

    function aggiornaLogica() {
        const obiettivoOra = calcolaObiettivoOra();
        render(obiettivoOra);
    }

    function render(obiettivoOra) {
        document.getElementById('label-drunk').innerText = appData.drunk;
        document.getElementById('label-goal').innerText = appData.goal;
        
        const percDrunk = (appData.drunk / appData.goal) * 100;
        const percTarget = (obiettivoOra / appData.goal) * 100;

        document.getElementById('fill').style.height = Math.min(percDrunk, 100) + "%";
        document.getElementById('target-mark').style.bottom = Math.min(percTarget, 100) + "%";

        const msg = document.getElementById('status-msg');
        const ritardoUI = document.getElementById('info-ritardo');

        const deficit = calcolaDeficit();

        if (appData.drunk >= appData.goal) {
            msg.innerText = "🏆 OBIETTIVO RAGGIUNTO! Sei un dio dell'acqua!";
            msg.style.color = "var(--green)";
            ritardoUI.innerText = "";
        } else if (deficit > 0) {
            msg.innerText = "⚠️ SEI IN RITARDO, pianta del deserto!";
            msg.style.color = "var(--red)";
            ritardoUI.innerText = `Ti mancano ${deficit} ml per non sembrare una spugna secca.`;
        } else {
            msg.innerText = "✅ Sei in perfetto ritmo, idratato come un cactus dopo la pioggia!";
            msg.style.color = "var(--blue)";
            ritardoUI.innerText = "";
        }
    }

    function bevi() {
        appData.drunk += 250;
        salvaDati();
        aggiornaLogica();
        
        // dopo aver bevuto, riprogramma subito la prossima notifica
        const deficit = calcolaDeficit();
        const intervallo = calcolaProssimoIntervallo(deficit);
        appData.nextReminder = Date.now() + intervallo;
        salvaDati();
    }

    // Aggiorna visualizzazione ogni minuto
    setInterval(aggiornaLogica, 60000);
</script>
</body>
</html>
