<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IdroLife - Il mio Assistente</title>
    <style>
        :root {
            --blue: #00a8ff;
            --green: #4cd137;
            --red: #e84118;
            --dark: #2f3640;
            --light: #f5f6fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.5s;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 360px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Navigazione Pagine */
        .page { display: none; }
        .active { display: block; }

        /* Bottiglia */
        .bottle-wrapper {
            width: 110px;
            height: 220px;
            border: 5px solid var(--dark);
            border-radius: 15px 15px 30px 30px;
            margin: 20px auto;
            position: relative;
            background: #fff;
            overflow: hidden;
        }

        .water-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #0077be, var(--blue));
            transition: height 1s ease-in-out;
        }

        /* Testi */
        .timer-text { font-size: 2.8rem; font-weight: bold; color: var(--red); margin: 10px 0; }
        .info-text { font-size: 1.2rem; margin-bottom: 20px; }

        /* Input e Bottoni */
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-start { background: var(--green); color: white; }
        .btn-drink { background: var(--blue); color: white; }
        .btn-pause { background: var(--dark); color: white; }
        .btn-back { background: none; color: #7f8c8d; text-decoration: underline; font-size: 0.9rem; }

        /* Dark Mode */
        body.night-mode { background-color: #1a1a2e; }
        body.night-mode .card { background-color: #16213e; color: white; }
    </style>
</head>
<body>

    <div id="setup-page" class="card page active">
        <h1>Configurazione</h1>
        <label>Obiettivo totale (ml):</label>
        <input type="number" id="input-goal" value="2000">
        <label>Capacità bicchiere (ml):</label>
        <input type="number" id="input-glass" value="250">
        <button class="btn-start" onclick="avviaApp()">INIZIA MONITORAGGIO</button>
    </div>

    <div id="main-page" class="card page">
        <button class="btn-back" onclick="tornaAlSetup()">⬅ Cambia Impostazioni</button>
        
        <div class="bottle-wrapper">
            <div id="fill" class="water-level"></div>
        </div>

        <div class="info-text">
            <b id="status-drunk">0</b> / <span id="status-goal">2000</span> ml
        </div>

        <div class="timer-text" id="display-timer">60:00</div>
        
        <button class="btn-drink" onclick="bevi()">BEVI UN BICCHIERE</button>
        <button id="btn-pause" class="btn-pause" onclick="togglePausa()">MODALITÀ NOTTE</button>
    </div>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    let dati = {
        goal: 2000,
        glass: 250,
        drunk: 0,
        secondsLeft: 3600,
        isPaused: false
    };

    let timerInterval;

    // Funzione per avviare l'app
    function avviaApp() {
        dati.goal = parseInt(document.getElementById('input-goal').value);
        dati.glass = parseInt(document.getElementById('input-glass').value);
        
        document.getElementById('setup-page').classList.remove('active');
        document.getElementById('main-page').classList.add('active');
        
        document.getElementById('status-goal').innerText = dati.goal;
        
        aggiornaGrafica();
        startTimer();
    }

    function tornaAlSetup() {
        clearInterval(timerInterval);
        document.getElementById('main-page').classList.remove('active');
        document.getElementById('setup-page').classList.add('active');
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if (!dati.isPaused && dati.secondsLeft > 0) {
                dati.secondsLeft--;
                updateTimerUI();
                
                if (dati.secondsLeft <= 0) {
                    document.getElementById('alert-sound').play();
                    alert("È ora di bere! La tua bottiglia ti aspetta.");
                }
            }
        }, 1000);
    }

    function bevi() {
        dati.drunk += dati.glass;
        if (dati.drunk > dati.goal) dati.drunk = dati.goal;
        
        // RESET DEL TIMER: Hai bevuto, quindi ti do un'altra ora
        dati.secondsLeft = 3600; 
        
        aggiornaGrafica();
        // Se l'audio era bloccato, questo click lo sblocca per il prossimo avviso
        document.getElementById('alert-sound').pause(); 
    }

    function aggiornaGrafica() {
        document.getElementById('status-drunk').innerText = dati.drunk;
        let percentuale = (dati.drunk / dati.goal) * 100;
        document.getElementById('fill').style.height = percentuale + "%";
        updateTimerUI();
    }

    function updateTimerUI() {
        let min = Math.floor(dati.secondsLeft / 60);
        let sec = dati.secondsLeft % 60;
        document.getElementById('display-timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function togglePausa() {
        dati.isPaused = !dati.isPaused;
        const b = document.getElementById('btn-pause');
        if (dati.isPaused) {
            b.innerText = "RIPRENDI (GIORNO)";
            document.body.classList.add('night-mode');
        } else {
            b.innerText = "MODALITÀ NOTTE";
            document.body.classList.remove('night-mode');
        }
    }
</script>

</body>
</html>
